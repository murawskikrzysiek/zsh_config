# ripgrep defaults (RIPGREP_CONFIG_PATH points here, see zsh/tools.zsh)
# Smart case: case-insensitive unless uppercase in pattern
--smart-case
# Show line numbers
--line-number
# Follow symlinks
--follow
# Hidden files (still respects .gitignore)
--hidden
# Don't search these dirs
--glob=!.git
--glob=!node_modules
--glob=!.venv
--glob=!*.lock
